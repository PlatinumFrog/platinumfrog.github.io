<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ted Boswell</title>
<link rel="stylesheet" href="index.css">
</head>
<body>

<iframe id="content" src="home.html"></iframe>

<div id="menu">
  <div id="hamburger">☰</div>
  <div class="sidebarmenuitem" id="home">🏠︎</div>
</div>

<div id="sidebar">
  <h4 class="sidebarmenuitem" id="projects">Projects</h4>
</h4>



<script>
const sidebar = document.getElementById("sidebar");
const hamburger = document.getElementById("hamburger");
const content = document.getElementById("content");
const homebutton = document.getElementById("home");

hamburger.addEventListener("click", () => {
  if(sidebar.classList.contains("open")) {
    sidebar.classList.remove("open");
    hamburger.classList.remove("open");
    homebutton.classList.remove("open");
  } else {
    sidebar.classList.add("open");
    hamburger.classList.add("open");
    homebutton.classList.add("open");
  }
});

document.querySelectorAll(".sidebarmenuitem").forEach(item=>{
  item.addEventListener("click", ()=>{
    content.src = item.id + ".html";
    sidebar.classList.remove("open");
    hamburger.classList.remove("open");
    homebutton.classList.remove("open");
  });
});

</script>

</body>
</html>
