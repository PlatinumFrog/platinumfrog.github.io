<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ted Boswell</title>
<link rel="stylesheet" href="index.css">
</head>
<body>

<iframe id="content" src="home.html"></iframe>

<div id="hamburger">☰</div>


<div id="sidebar">
  <div class="sidebarmenuitem" id="home">🏠︎</div>
  <h4 class="sidebarmenuitem" id="about">About</h4>
  <h4 class="sidebarmenuitem" id="contact">Contact</h4>

</div>



<script>
const sidebar = document.getElementById("sidebar");
const hamburger = document.getElementById("hamburger");
const content = document.getElementById("content");
const homebutton = document.getElementById("gotohome");

hamburger.addEventListener("click", () => {
  if(sidebar.classList.contains("open")) {
    sidebar.classList.remove("open");
    hamburger.classList.remove("open");
    homebutton.classList.remove("open");
  } else {
    sidebar.classList.add("open");
    hamburger.classList.add("open");
    homebutton.classList.add("open");
  }
});


async function loadPage(page){
  content.src = page + ".html";
}

document.querySelectorAll(".sidebarmenuitem").forEach(item=>{
  item.addEventListener("click", ()=>{
    const page = item.id;
    loadPage(page);
    sidebar.classList.remove("open");
  });
});

</script>

</body>
</html>
